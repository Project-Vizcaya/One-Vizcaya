name: flutter_application_1
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  firebase_storage: ^13.0.4
  cloud_firestore: ^6.1.0
  firebase_app_check: ^0.4.1+2

  # App Packages
  url_launcher: ^6.2.6
  image_picker: ^1.0.7
  geolocator: ^14.0.2
  fluttertoast: ^9.0.0
  timeago: ^3.6.1
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/Seal_of_Nueva_Vizcaya.svg.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/Seal_of_Nueva_Vizcaya.svg.png"
  min_sdk_android: 21