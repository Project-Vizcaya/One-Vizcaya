name: one_vizcaya
description: "One Vizcaya is a cross-platform mobile application built with Flutter and Firebase, designed to bridge the communication gap between the citizens of Bambang, Nueva Vizcaya, and their Local Government Unit (LGU)."
publish_to: 'none'
version: 1.0.6+8

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.1

  # Firebase
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  firebase_storage: ^13.0.4
  cloud_firestore: ^6.1.0
  firebase_app_check: ^0.4.1+2

  # App Packages
  url_launcher: ^6.2.6
  image_picker: ^1.0.7
  geolocator: ^14.0.2
  fluttertoast: ^9.0.0
  timeago: ^3.6.1
  shared_preferences: ^2.3.2
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/Seal_of_Nueva_Vizcaya.svg.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/Seal_of_Nueva_Vizcaya.svg.png"