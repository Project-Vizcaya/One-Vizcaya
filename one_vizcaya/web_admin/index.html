<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>One Vizcaya — Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:linear-gradient(145deg,#1B5E20 0%,#2E7D32 50%,#F57F17 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
    .card{background:#fff;border-radius:24px;padding:44px 40px;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,0.35);animation:fadeUp .4s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .logo{text-align:center;margin-bottom:32px}
    .logo-ring{width:96px;height:96px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 8px 28px rgba(46,125,50,.3);border:3px solid #C8E6C9;overflow:hidden}
    .logo-ring img{width:88px;height:88px;object-fit:contain;border-radius:50%}
    .logo-ring span{font-size:36px}
    .logo h1{font-size:24px;font-weight:800;color:#1B5E20;letter-spacing:-.3px}
    .logo p{font-size:13px;color:#777;margin-top:4px}
    .badge{display:inline-block;background:linear-gradient(90deg,#E8F5E9,#FFF8E1);color:#1B5E20;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;margin-top:8px;border:1px solid #C8E6C9}
    label{font-size:12px;font-weight:700;color:#555;display:block;margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px}
    .input-group{display:flex;gap:8px;margin-bottom:18px}
    .prefix{background:#EEF8F0;border:1.5px solid #C8E6C9;border-radius:12px;padding:0 14px;display:flex;align-items:center;font-size:14px;font-weight:600;color:#2E7D32;white-space:nowrap}
    input{width:100%;border:1.5px solid #E0E0E0;border-radius:12px;padding:13px 15px;font-size:15px;outline:none;transition:all .2s;color:#222}
    input:focus{border-color:#2E7D32;box-shadow:0 0 0 3px rgba(46,125,50,.1)}
    .btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:4px}
    .btn-primary{background:linear-gradient(135deg,#2E7D32,#1B5E20);color:#fff;box-shadow:0 4px 16px rgba(46,125,50,.35)}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(46,125,50,.45)}
    .btn-primary:disabled{background:#A5D6A7;cursor:not-allowed;transform:none;box-shadow:none}
    .btn-outline{background:#fff;color:#2E7D32;border:2px solid #2E7D32;margin-top:10px}
    .btn-outline:hover{background:#E8F5E9}
    #otp-section{display:none}
    .error{background:#FFEBEE;color:#C62828;border-radius:12px;padding:11px 15px;font-size:13px;margin-top:12px;display:none;border-left:4px solid #EF5350}
    .success{background:#E8F5E9;color:#2E7D32;border-radius:12px;padding:11px 15px;font-size:13px;margin-top:12px;display:none;border-left:4px solid #66BB6A}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .footer{text-align:center;font-size:11px;color:#aaa;margin-top:28px;line-height:1.6}
    #recaptcha-container{margin-top:8px}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-ring">
      <img src="img/seals/nueva-vizcaya.png" alt="Nueva Vizcaya Seal"
           onerror="this.style.display='none';this.parentElement.innerHTML='<span>🏛️</span>'"/>
    </div>
    <h1>One Vizcaya</h1>
    <p>Nueva Vizcaya Province</p>
    <span class="badge">Admin Dashboard</span>
  </div>

  <div id="phone-section">
    <label for="phone">Phone Number</label>
    <div class="input-group">
      <div class="prefix">+63</div>
      <input type="tel" id="phone" placeholder="9XXXXXXXXX" maxlength="10" inputmode="numeric"/>
    </div>
    <div id="recaptcha-container"></div>
    <button class="btn btn-primary" id="send-otp-btn" onclick="sendOTP()">Send Verification Code</button>
  </div>

  <div id="otp-section">
    <label for="otp">Verification Code</label>
    <input type="text" id="otp" placeholder="Enter 6-digit code" maxlength="6" inputmode="numeric" style="margin-bottom:16px"/>
    <button class="btn btn-primary" id="verify-btn" onclick="verifyOTP()">Verify & Sign In</button>
    <button class="btn btn-outline" onclick="resetLogin()">← Change Number</button>
  </div>

  <div id="error-msg" class="error"></div>
  <div id="success-msg" class="success"></div>

  <div class="footer">
    One Vizcaya Admin Portal v1.1.1<br/>
    Authorized personnel only
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="js/config.js"></script>
<script>
  firebase.initializeApp(FIREBASE_CONFIG);
  const auth = firebase.auth();
  const db   = firebase.firestore();
  let confirmationResult = null;
  let recaptchaVerifier  = null;

  window.onload = () => {
    auth.onAuthStateChanged(async user => {
      if (user) await checkRoleAndRedirect(user);
    });
    recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
      size: 'invisible',
      callback: () => {}
    });
    recaptchaVerifier.render();
  };

  async function sendOTP() {
    const raw   = document.getElementById('phone').value.trim();
    const phone = '+63' + raw;
    if (!/^\+63[0-9]{10}$/.test(phone)) {
      return showError('Enter a valid 10-digit Philippine mobile number.');
    }
    setLoading('send-otp-btn', true, 'Sending…');
    hideMessages();
    try {
      confirmationResult = await auth.signInWithPhoneNumber(phone, recaptchaVerifier);
      document.getElementById('phone-section').style.display = 'none';
      document.getElementById('otp-section').style.display   = 'block';
      showSuccess('Code sent to +63' + raw);
    } catch (e) {
      showError('Failed to send code: ' + e.message);
      recaptchaVerifier.render();
    }
    setLoading('send-otp-btn', false, 'Send Verification Code');
  }

  async function verifyOTP() {
    const code = document.getElementById('otp').value.trim();
    if (code.length !== 6) return showError('Enter the 6-digit code.');
    setLoading('verify-btn', true, 'Verifying…');
    hideMessages();
    try {
      const result = await confirmationResult.confirm(code);
      await checkRoleAndRedirect(result.user);
    } catch (e) {
      showError('Invalid code. Please try again.');
      setLoading('verify-btn', false, 'Verify & Sign In');
    }
  }

  async function checkRoleAndRedirect(user) {
    try {
      const doc  = await db.collection('users').doc(user.uid).get();
      const role = doc.exists ? (doc.data().role || 'citizen') : 'citizen';
      const allowed = ['admin','municipal_admin','provincial_admin','super_admin'];
      if (allowed.includes(role)) {
        window.location.href = 'dashboard.html';
      } else {
        await auth.signOut();
        showError('Access denied. This portal is for LGU administrators only.');
        setLoading('verify-btn', false, 'Verify & Sign In');
      }
    } catch (e) {
      showError('Could not verify role: ' + e.message);
      setLoading('verify-btn', false, 'Verify & Sign In');
    }
  }

  function resetLogin() {
    document.getElementById('phone-section').style.display = 'block';
    document.getElementById('otp-section').style.display   = 'none';
    document.getElementById('phone').value = '';
    document.getElementById('otp').value   = '';
    hideMessages();
    confirmationResult = null;
  }

  function showError(msg)   { const el = document.getElementById('error-msg');   el.textContent = msg; el.style.display = 'block'; document.getElementById('success-msg').style.display = 'none'; }
  function showSuccess(msg) { const el = document.getElementById('success-msg'); el.textContent = msg; el.style.display = 'block'; document.getElementById('error-msg').style.display   = 'none'; }
  function hideMessages()   { document.getElementById('error-msg').style.display = 'none'; document.getElementById('success-msg').style.display = 'none'; }
  function setLoading(id, loading, label) {
    const btn = document.getElementById(id);
    btn.disabled   = loading;
    btn.innerHTML  = loading ? '<span class="spinner"></span>' + label : label;
  }

  document.getElementById('phone').addEventListener('keydown', e => { if (e.key === 'Enter') sendOTP(); });
  document.getElementById('otp').addEventListener('keydown', e => { if (e.key === 'Enter') verifyOTP(); });
</script>
</body>
</html>
